<!DOCTYPE html>
<html>
<head>
  <title>Caza Estrellas</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>

<body onload="iniciar()">

  <div class="fondo-animado"></div>

  <div class="contenedor">
    
    <header class="encabezado">
      <h1>🍋 ATRAPAR LIMONES</h1>
      <p class="frase">Modo arcade activado</p>
    </header>

    <div class="juego-box">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </div>

    <div class="panel">
      <div class="card">
        <p>PUNTAJE</p>
        <span id="txtPuntaje">0</span>
      </div>
      <div class="card vidas">
        <p>VIDAS</p>
        <span id="txtVidas">3</span>
      </div>
    </div>

    <div class="botones">
      <button onclick="moverIzquierda()">⬅</button>
      <button onclick="moverDerecha()">➡</button>
      <button class="reiniciar" onclick="reiniciarJuego()">⟳</button>
    </div>

  </div>

  <div id="flash"></div>

  <script src="limones.js"></script>
</body>
  
</html>
