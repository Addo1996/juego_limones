<!DOCTYPE html>
<html>
<head>
  <title>Caza Estrellas</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>

<body onload="iniciar()">

  <div class="contenedor">
    
    <header class="encabezado">
      <h1>🍋 Atrapar Limones</h1>
      <p class="frase">Si del cielo te caen limones, aprende a hacer limonada</p>
      <h2 class="autor">Autor: Addonys Herrera</h2>
    </header>

    <div class="juego-box">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </div>
    
    <div class="panel">
      <div class="card">
        <p>Puntaje</p>
        <span id="txtPuntaje">0</span>
      </div>
      <div class="card">
        <p>Vidas</p>
        <span id="txtVidas">3</span>
      </div>
    </div>

    <div class="botones">
      <button onclick="moverIzquierda()">⬅ Izquierda</button>
      <button onclick="moverDerecha()">Derecha ➡</button>
      <button class="reiniciar">🔄 Reiniciar</button>
    </div>

  </div>

  <script src="limones.js"></script>

</body>
</html>
